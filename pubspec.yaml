name: my_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.8.3
  cupertino_icons: ^1.0.8
  pdf: ^3.11.3
  printing: ^5.14.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#3F51B5"
  adaptive_icon_foreground: "assets/icon.png"

# ഈ ഭാഗം ശ്രദ്ധിക്കുക: ഒട്ടും സ്പേസ് ഇല്ലാതെ വേണം തുടങ്ങാൻ
flutter:
  uses-material-design: true

  assets:
    - assets/icon.png
    - assets/logo.png
    - assets/fonts/AnjaliOldLipi.ttf

  fonts:
    - family: AnjaliFont
      fonts:
        - asset: assets/fonts/AnjaliOldLipi.ttf